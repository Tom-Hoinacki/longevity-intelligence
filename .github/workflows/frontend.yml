name: Frontend
on:
  push: {paths: ['src/Longevity.Web/**', '.github/workflows/frontend.yml']}
  pull_request: {paths: ['src/Longevity.Web/**', '.github/workflows/frontend.yml']}
jobs:
  check:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: src/Longevity.Web}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20, cache: npm, cache-dependency-path: src/Longevity.Web/package-lock.json}
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run build
